<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>로그인 — Tommy Survey</title>
  <link rel="stylesheet" href="/style.css" />
  <script src="https://accounts.google.com/gsi/client" async></script>
  <style>
    .google-btn {
      display: flex; align-items: center; justify-content: center; gap: 12px;
      width: 100%; padding: 14px 20px; border: 1.5px solid var(--border);
      border-radius: var(--radius-sm); background: var(--surface);
      font-size: 1rem; font-weight: 600; color: var(--gray-700);
      cursor: pointer; transition: background .15s, box-shadow .15s;
    }
    .google-btn:hover:not(:disabled) { background: var(--gray-50); box-shadow: var(--shadow-sm); }
    .google-btn:disabled { opacity: .45; cursor: not-allowed; }
    .google-btn svg { width: 22px; height: 22px; flex-shrink: 0; }
    .dev-section {
      margin-top: 28px; padding: 18px;
      border: 1.5px dashed var(--gray-300); border-radius: var(--radius);
      background: var(--gray-50);
    }
    .dev-label {
      font-size: .72rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .08em; color: var(--gray-400); margin-bottom: 12px;
    }
    .setup-box {
      background: #EFF6FF; border: 1px solid #BFDBFE;
      border-radius: var(--radius-sm); padding: 14px 16px;
      font-size: .82rem; color: #1E40AF; line-height: 1.7; margin-top: 14px;
    }
    .setup-box code {
      background: #DBEAFE; padding: 1px 6px; border-radius: 4px;
      font-family: monospace; font-size: .8rem;
    }
  </style>
</head>
<body>

<div class="auth-page">
  <div class="auth-card">
    <a href="/index.html" class="auth-logo">TommySurvey</a>

    <p style="text-align:center;color:var(--text-sub);font-size:.9rem;margin-bottom:28px;">
      Google 계정으로 간편하게 시작하세요
    </p>

    <!-- Google OAuth 버튼 -->
    <button class="google-btn" id="google-btn" onclick="startGoogleLogin()" disabled>
      <svg viewBox="0 0 48 48">
        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.36-8.16 2.36-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
      </svg>
      <span id="google-btn-text">Google로 로그인</span>
    </button>

    <!-- Client ID 미설정 안내 -->
    <div class="setup-box" id="setup-guide">
      <strong>Google Client ID 설정이 필요합니다</strong><br/>
      <code>auth.html</code> 상단의 <code>GOOGLE_CLIENT_ID</code>를 교체하면 버튼이 활성화됩니다.<br/>
      발급: Google Cloud Console → API 및 서비스 → 사용자 인증 정보 → OAuth 2.0 클라이언트 ID
    </div>

    <!-- 개발용 테스트 로그인 (Client ID 미설정 시에만 노출) -->
    <div class="dev-section" id="dev-section">
      <div class="dev-label">🛠 개발용 테스트 로그인</div>
      <div class="form-group" style="margin-bottom:10px;">
        <label class="form-label">이름</label>
        <input type="text" class="form-input" id="dev-name" placeholder="홍길동" />
      </div>
      <div class="form-group" style="margin-bottom:10px;">
        <label class="form-label">이메일</label>
        <input type="email" class="form-input" id="dev-email" placeholder="test@example.com" />
      </div>
      <div class="role-select" style="margin-bottom:14px;">
        <button class="role-btn active" id="dev-role-creator" onclick="selectDevRole('creator')">
          <div class="role-icon">🧑‍💼</div>
          <div class="role-name">의뢰자</div>
        </button>
        <button class="role-btn" id="dev-role-panel" onclick="selectDevRole('panel')">
          <div class="role-icon">👤</div>
          <div class="role-name">패널</div>
        </button>
      </div>
      <div id="dev-error" class="form-error" style="display:none;margin-bottom:8px;"></div>
      <button class="btn btn-secondary btn-block" onclick="devLogin()">테스트 로그인</button>
    </div>

    <p style="text-align:center;font-size:.78rem;color:var(--text-sub);margin-top:20px;">
      가입 시 <a href="#" style="color:var(--primary);">이용약관</a> 및
      <a href="#" style="color:var(--primary);">개인정보처리방침</a>에 동의합니다.
    </p>
  </div>
</div>

<!-- 신규 가입 역할 선택 모달 (Google OAuth 용) -->
<div class="modal-backdrop" id="google-role-modal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">역할을 선택해 주세요</span>
    </div>
    <p style="font-size:.875rem;color:var(--text-sub);margin-bottom:20px;">
      <span id="google-user-name" style="font-weight:700;color:var(--gray-900);"></span>님,
      Tommy Survey에서 어떤 역할로 활동하실 건가요?
    </p>
    <div class="role-select">
      <button class="role-btn active" id="modal-role-creator" onclick="selectGoogleRole('creator')">
        <div class="role-icon">🧑‍💼</div>
        <div class="role-name">의뢰자</div>
        <div class="role-desc">설문 제작·배포</div>
      </button>
      <button class="role-btn" id="modal-role-panel" onclick="selectGoogleRole('panel')">
        <div class="role-icon">👤</div>
        <div class="role-name">패널</div>
        <div class="role-desc">설문 참여·보상</div>
      </button>
    </div>
    <div class="modal-footer">
      <button class="btn btn-primary btn-block btn-lg" onclick="completeGoogleSignup()">시작하기</button>
    </div>
  </div>
</div>

<div id="toast-container"></div>
<script src="/main.js"></script>
<script>
/* ──────────────────────────────────────────────────────
   Google OAuth Client ID
   Google Cloud Console → OAuth 2.0 클라이언트 ID 발급 후 입력
   ────────────────────────────────────────────────────── */
const GOOGLE_CLIENT_ID = 'YOUR_GOOGLE_CLIENT_ID.apps.googleusercontent.com';

let pendingGoogle   = null;
let googleRoleModal = 'creator';
let devRole         = 'creator';

const isConfigured = () => !GOOGLE_CLIENT_ID.startsWith('YOUR_');

/* ── GIS 초기화 ───────────────────────────────── */
window.addEventListener('load', () => {
  if (isConfigured()) {
    // 실제 Google OAuth 활성화
    document.getElementById('google-btn').disabled    = false;
    document.getElementById('setup-guide').style.display = 'none';
    document.getElementById('dev-section').style.display  = 'none';

    if (typeof google !== 'undefined' && google.accounts) {
      google.accounts.id.initialize({
        client_id: GOOGLE_CLIENT_ID,
        callback: handleGoogleCredential,
        auto_select: false,
      });
    }
  }
  // 미설정 시: Google 버튼 비활성 + 안내 + 개발용 섹션 노출 (기본값)
});

/* ── 실제 Google OAuth ────────────────────────── */
function startGoogleLogin() {
  if (typeof google === 'undefined' || !google.accounts) {
    toast('Google 로그인 라이브러리 로딩 중입니다. 잠시 후 다시 시도하세요.', 'warning');
    return;
  }
  google.accounts.id.prompt();
}

function handleGoogleCredential(response) {
  const payload = decodeJwt(response.credential);
  processGoogleUser({ email: payload.email, name: payload.name, picture: payload.picture });
}

function decodeJwt(token) {
  const base64 = token.split('.')[1].replace(/-/g, '+').replace(/_/g, '/');
  return JSON.parse(decodeURIComponent(
    atob(base64).split('').map(c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join('')
  ));
}

/* ── 공통: 유저 처리 ──────────────────────────── */
function processGoogleUser({ email, name, picture = '' }) {
  const existing = DB.getUsers().find(u => u.email === email);
  if (existing) {
    DB.setSession({ userId: existing.id, role: existing.role });
    toast(`${existing.name}님, 환영합니다!`, 'success');
    redirect(existing.role);
  } else {
    pendingGoogle = { email, name, picture };
    document.getElementById('google-user-name').textContent = name;
    document.getElementById('google-role-modal').classList.add('open');
  }
}

/* ── 역할 선택 모달 (Google OAuth 신규 가입) ─── */
function selectGoogleRole(role) {
  googleRoleModal = role;
  document.getElementById('modal-role-creator').classList.toggle('active', role === 'creator');
  document.getElementById('modal-role-panel').classList.toggle('active',   role === 'panel');
}

function completeGoogleSignup() {
  if (!pendingGoogle) return;
  const newUser = {
    id: genId('user'), email: pendingGoogle.email, name: pendingGoogle.name,
    picture: pendingGoogle.picture, role: googleRoleModal, password: null,
    credits:  googleRoleModal === 'creator' ? 0 : undefined,
    points:   googleRoleModal === 'panel'   ? 0 : undefined,
    provider: 'google', createdAt: new Date().toISOString()
  };
  const users = DB.getUsers();
  users.push(newUser);
  DB.setUsers(users);
  DB.setSession({ userId: newUser.id, role: newUser.role });
  document.getElementById('google-role-modal').classList.remove('open');
  toast('가입이 완료되었습니다!', 'success');
  redirect(newUser.role);
}

/* ── 개발용 테스트 로그인 ─────────────────────── */
function selectDevRole(role) {
  devRole = role;
  document.getElementById('dev-role-creator').classList.toggle('active', role === 'creator');
  document.getElementById('dev-role-panel').classList.toggle('active',   role === 'panel');
}

function devLogin() {
  const name  = document.getElementById('dev-name').value.trim();
  const email = document.getElementById('dev-email').value.trim();
  const errEl = document.getElementById('dev-error');
  errEl.style.display = 'none';
  if (!name)  { errEl.textContent = '이름을 입력해 주세요.'; errEl.style.display = ''; return; }
  if (!email || !email.includes('@')) { errEl.textContent = '올바른 이메일을 입력해 주세요.'; errEl.style.display = ''; return; }

  const users    = DB.getUsers();
  let user = users.find(u => u.email === email);
  if (!user) {
    user = {
      id: genId('user'), email, name, role: devRole, password: null,
      credits: devRole === 'creator' ? 0 : undefined,
      points:  devRole === 'panel'   ? 0 : undefined,
      provider: 'dev', createdAt: new Date().toISOString()
    };
    users.push(user);
    DB.setUsers(users);
  }
  DB.setSession({ userId: user.id, role: user.role });
  toast(`${user.name}님, 환영합니다!`, 'success');
  redirect(user.role);
}

function redirect(role) {
  setTimeout(() => {
    window.location.href = role === 'creator' ? '/dashboard.html' : '/panel.html';
  }, 500);
}

document.addEventListener('DOMContentLoaded', () => {
  const user = currentUser();
  if (user) redirect(user.role);
});
</script>
</body>
</html>
